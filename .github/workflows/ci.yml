# CI：每次 push 和 PR 执行代码质量检查
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: ESLint & 类型检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: ESLint 代码规范
        run: npx eslint . --cache

      - name: TypeScript 类型检查
        run: npx vue-tsc --noEmit
